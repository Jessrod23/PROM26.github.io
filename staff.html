<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CONTROL STAFF PROM26</title>

<link rel="stylesheet" href="style.css">

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>

.staff-grid{

    display:grid;

    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));

    gap:20px;

    margin-top:30px;

}

.staff-card{

    background:#1a1a1a;

    padding:20px;

    border-radius:20px;

    border:3px solid #00bfff;

    text-align:center;

}

.staff-card img{

    width:180px;

    background:white;

    padding:10px;

    border-radius:15px;

}

.estado{

    margin-top:15px;

    font-size:20px;

    font-weight:bold;

}

.llego{

    color:lime;

}

.falta{

    color:red;

}

.hora{

    margin-top:10px;

    color:#00bfff;

}

</style>

</head>
<body>

<header>
CONTROL STAFF PROM26
</header>

<div class="container">

<div class="card">

<h1>STAFF REGISTRADO</h1>

<p>
Aquí aparece qué STAFF ya llegó al evento.
</p>

<a href="index.html">

<button>
VOLVER AL PANEL
</button>

</a>

</div>

<div class="staff-grid" id="staffLista"></div>

</div>

<script>

// =====================================
// FIREBASE
// =====================================

const firebaseConfig = {

  apiKey: "AIzaSyBtloFEBGr6Z2hFkT3zr02tgiu5IIyqBkE",

  authDomain: "prom26-62dce.firebaseapp.com",

  projectId: "prom26-62dce",

  storageBucket: "prom26-62dce.firebasestorage.app",

  messagingSenderId: "662057183440",

  appId: "1:662057183440:web:96484f9031cbfb9b3596d5"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

// =====================================
// CARGAR STAFF
// =====================================

async function cargarStaff(){

    const lista = document.getElementById("staffLista");

    lista.innerHTML = "";

    const snapshot = await db.collection("boletos").get();

    snapshot.forEach((doc)=>{

        const data = doc.data();

        // SOLO STAFF
        if(data.tipo !== "STAFF"){
            return;
        }

        let estado = "NO HA LLEGADO ❌";
        let clase = "falta";
        let hora = "";

        if(data.usado){

            estado = "YA LLEGÓ ✅";

            clase = "llego";

            if(data.horaEntrada){

                hora = `
                <div class="hora">
                Entrada registrada
                </div>
                `;
            }

        }

        lista.innerHTML += `

        <div class="staff-card">

            <h2>PROM26 STAFF</h2>

            <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${data.id}">

            <h3>${data.id}</h3>

            <div class="estado ${clase}">
            ${estado}
            </div>

            ${hora}

        </div>

        `;

    });

}

// =====================================
// ACTUALIZAR AUTOMÁTICO
// =====================================

setInterval(()=>{

    cargarStaff();

},3000);

cargarStaff();

</script>

</body>
</html>
