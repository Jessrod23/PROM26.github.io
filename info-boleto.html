<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Información del boleto - PROM26</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <!-- Escáner QR -->
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #070707;
      color: white;
      text-align: center;
    }

    header {
      background: #111;
      padding: 22px;
      border-bottom: 2px solid #d4af37;
    }

    header h1 {
      margin: 0;
      color: #d4af37;
      font-size: 32px;
      letter-spacing: 2px;
    }

    header p {
      margin: 8px 0 0;
      color: #ddd;
    }

    .contenedor {
      max-width: 750px;
      margin: 25px auto;
      background: #151515;
      padding: 25px;
      border-radius: 18px;
      box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
    }

    h2, h3 {
      color: #d4af37;
    }

    label {
      display: block;
      margin-top: 15px;
      color: #d4af37;
      font-weight: bold;
      text-align: left;
    }

    input {
      width: 100%;
      padding: 14px;
      margin-top: 8px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
      box-sizing: border-box;
      outline: none;
    }

    button {
      margin-top: 18px;
      padding: 14px 20px;
      border: none;
      border-radius: 12px;
      background: #d4af37;
      color: #000;
      font-size: 17px;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
    }

    button:hover {
      background: #f1cf5c;
    }

    #reader {
      width: 100%;
      max-width: 450px;
      margin: 20px auto;
      background: white;
      padding: 10px;
      border-radius: 15px;
      box-sizing: border-box;
    }

    .mensaje {
      margin-top: 20px;
      padding: 18px;
      border-radius: 15px;
      font-size: 18px;
      font-weight: bold;
      display: none;
    }

    .ok {
      background: #0f5132;
      color: #d1e7dd;
    }

    .error {
      background: #842029;
      color: #f8d7da;
    }

    .alerta {
      background: #664d03;
      color: #fff3cd;
    }

    .tarjeta {
      margin-top: 25px;
      background: #222;
      padding: 20px;
      border-radius: 16px;
      text-align: left;
      display: none;
      border: 1px solid #333;
    }

    .fila {
      padding: 12px;
      border-bottom: 1px solid #333;
      font-size: 16px;
    }

    .fila:last-child {
      border-bottom: none;
    }

    .titulo-campo {
      color: #d4af37;
      font-weight: bold;
      display: block;
      margin-bottom: 4px;
    }

    .valor {
      color: white;
      word-break: break-word;
    }

    .estado-usado {
      color: #ff6b6b;
      font-weight: bold;
    }

    .estado-libre {
      color: #51cf66;
      font-weight: bold;
    }

    .menu {
      margin-top: 25px;
    }

    .menu a {
      display: block;
      color: #d4af37;
      text-decoration: none;
      font-weight: bold;
      margin-top: 12px;
    }

    .tabla-json {
      background: #111;
      color: #eee;
      padding: 15px;
      border-radius: 12px;
      overflow-x: auto;
      white-space: pre-wrap;
      font-size: 14px;
      margin-top: 15px;
    }
  </style>
</head>

<body>

<header>
  <h1>PROM26</h1>
  <p>Consulta completa de boletos</p>
</header>

<div class="contenedor">

  <h2>Buscar información del boleto</h2>

  <label>Código del boleto</label>
  <input type="text" id="codigoManual" placeholder="Ejemplo: PROM26-0001">

  <button onclick="buscarManual()">Buscar boleto</button>

  <h3>O escanea el QR</h3>

  <div id="reader"></div>

  <div id="mensaje" class="mensaje"></div>

  <div id="infoBoleto" class="tarjeta"></div>

  <div class="menu">
    <a href="admin.html">Volver al panel admin</a>
    <a href="registrar-rp.html">Registrar boletos a RP</a>
    <a href="scanner.html">Ir al escáner de entrada</a>
  </div>

</div>

<script>
  // ======================================
  // FIREBASE PROM26
  // ======================================
  const firebaseConfig = {
    apiKey: "AIzaSyBtloFEBGr6Z2hFkT3zr02tgiu5IIyqBkE",
    authDomain: "prom26-62dce.firebaseapp.com",
    databaseURL: "https://prom26-62dce-default-rtdb.firebaseio.com",
    projectId: "prom26-62dce",
    storageBucket: "prom26-62dce.firebasestorage.app",
    messagingSenderId: "662057183440",
    appId: "1:662057183440:web:96484f9031cbfb9b3596d5"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  const mensaje = document.getElementById("mensaje");
  const infoBoleto = document.getElementById("infoBoleto");

  let ultimoCodigoEscaneado = "";

  function mostrarMensaje(texto, tipo) {
    mensaje.style.display = "block";
    mensaje.className = "mensaje " + tipo;
    mensaje.innerHTML = texto;
  }

  function limpiarTextoQR(texto) {
    return texto.trim();
  }

  function formatearFecha(valor) {
    if (!valor) return "No registrado";

    try {
      if (valor.toDate) {
        return valor.toDate().toLocaleString("es-MX");
      }

      if (typeof valor === "string") {
        return valor;
      }

      return JSON.stringify(valor);
    } catch (e) {
      return "No disponible";
    }
  }

  function mostrarValor(valor) {
    if (valor === true) return "Sí";
    if (valor === false) return "No";
    if (valor === null || valor === undefined || valor === "") return "No registrado";

    if (valor && valor.toDate) {
      return formatearFecha(valor);
    }

    if (typeof valor === "object") {
      return JSON.stringify(valor, null, 2);
    }

    return valor;
  }

  async function buscarBoleto(codigo) {
    // Buscar primero usando el código como ID del documento
    let docRef = db.collection("boletos").doc(codigo);
    let docSnap = await docRef.get();

    if (docSnap.exists) {
      return {
        existe: true,
        id: docSnap.id,
        ref: docRef,
        data: docSnap.data()
      };
    }

    // Si no existe como ID, buscar por campo codigo
    let query = await db.collection("boletos")
      .where("codigo", "==", codigo)
      .limit(1)
      .get();

    if (!query.empty) {
      let doc = query.docs[0];

      return {
        existe: true,
        id: doc.id,
        ref: doc.ref,
        data: doc.data()
      };
    }

    return {
      existe: false
    };
  }

  async function consultarBoleto(codigo) {
    codigo = limpiarTextoQR(codigo);

    if (!codigo) {
      mostrarMensaje("Escribe o escanea un código de boleto.", "alerta");
      infoBoleto.style.display = "none";
      return;
    }

    try {
      mostrarMensaje("Buscando boleto...", "alerta");

      const boleto = await buscarBoleto(codigo);

      if (!boleto.existe) {
        mostrarMensaje("No se encontró ningún boleto con este código:<br><br><b>" + codigo + "</b>", "error");
        infoBoleto.style.display = "none";
        return;
      }

      const data = boleto.data;

      const codigoBoleto = data.codigo || codigo;
      const tipo = data.tipo || data.seccion || "No especificado";
      const nombre = data.nombre || data.nombrePersona || data.persona || "No registrado";
      const usado = data.usado === true;
      const rpAsignado = data.rpAsignado || "No asignado";
      const entregadoRP = data.entregadoRP === true ? "Sí" : "No";
      const fechaEntregaRP = formatearFecha(data.fechaEntregaRP);
      const fechaEntrada = formatearFecha(data.fechaUso || data.fechaEntrada || data.fechaEscaneo);
      const folio = data.folio || "No registrado";

      mostrarMensaje("Boleto encontrado correctamente.", "ok");

      let html = `
        <h2>Información del boleto</h2>

        <div class="fila">
          <span class="titulo-campo">Código:</span>
          <span class="valor">${codigoBoleto}</span>
        </div>

        <div class="fila">
          <span class="titulo-campo">ID en Firebase:</span>
          <span class="valor">${boleto.id}</span>
        </div>

        <div class="fila">
          <span class="titulo-campo">Folio:</span>
          <span class="valor">${folio}</span>
        </div>

        <div class="fila">
          <span class="titulo-campo">Tipo / sección:</span>
          <span class="valor">${tipo}</span>
        </div>

        <div class="fila">
          <span class="titulo-campo">Nombre registrado:</span>
          <span class="valor">${nombre}</span>
        </div>

        <div class="fila">
          <span class="titulo-campo">Estado de entrada:</span>
          <span class="${usado ? "estado-usado" : "estado-libre"}">
            ${usado ? "Ya fue usado / ya entró" : "Disponible / todavía no entra"}
          </span>
        </div>

        <div class="fila">
          <span class="titulo-campo">RP asignado:</span>
          <span class="valor">${rpAsignado}</span>
        </div>

        <div class="fila">
          <span class="titulo-campo">Entregado a RP:</span>
          <span class="valor">${entregadoRP}</span>
        </div>

        <div class="fila">
          <span class="titulo-campo">Fecha de entrega al RP:</span>
          <span class="valor">${fechaEntregaRP}</span>
        </div>

        <div class="fila">
          <span class="titulo-campo">Fecha de entrada / escaneo:</span>
          <span class="valor">${fechaEntrada}</span>
        </div>

        <h3>Todos los datos guardados</h3>
        <div class="tabla-json">${JSON.stringify(convertirDatos(data), null, 2)}</div>
      `;

      infoBoleto.innerHTML = html;
      infoBoleto.style.display = "block";

    } catch (error) {
      console.error(error);
      mostrarMensaje("Ocurrió un error al consultar el boleto. Revisa Firebase o la consola.", "error");
      infoBoleto.style.display = "none";
    }
  }

  function convertirDatos(data) {
    let limpio = {};

    for (let campo in data) {
      let valor = data[campo];

      if (valor && valor.toDate) {
        limpio[campo] = valor.toDate().toLocaleString("es-MX");
      } else {
        limpio[campo] = valor;
      }
    }

    return limpio;
  }

  function buscarManual() {
    const codigo = document.getElementById("codigoManual").value.trim();
    consultarBoleto(codigo);
  }

  function iniciarScanner() {
    const html5QrCode = new Html5Qrcode("reader");

    Html5Qrcode.getCameras().then(cameras => {
      if (cameras && cameras.length) {
        html5QrCode.start(
          { facingMode: "environment" },
          {
            fps: 10,
            qrbox: 250
          },
          qrCodeMessage => {
            const codigo = limpiarTextoQR(qrCodeMessage);

            if (codigo === ultimoCodigoEscaneado) {
              return;
            }

            ultimoCodigoEscaneado = codigo;
            document.getElementById("codigoManual").value = codigo;

            consultarBoleto(codigo);

            setTimeout(() => {
              ultimoCodigoEscaneado = "";
            }, 3000);
          },
          errorMessage => {
            // No mostrar errores repetitivos del escáner
          }
        );
      } else {
        mostrarMensaje("No se encontró cámara disponible.", "error");
      }
    }).catch(err => {
      console.error(err);
      mostrarMensaje("No se pudo abrir la cámara. Revisa permisos del navegador.", "error");
    });
  }

  iniciarScanner();
</script>

</body>
</html>
