<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ESCÁNER PROM26</title>

<link rel="stylesheet" href="style.css">

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<!-- QR -->
<script src="https://unpkg.com/html5-qrcode"></script>

<style>

#reader{

    width:100%;

    max-width:500px;

    margin:auto;

    background:white;

    padding:20px;

    border-radius:20px;

}

#resultadoScan{

    margin-top:30px;

    text-align:center;

    font-size:35px;

    font-weight:bold;

}

.success{

    color:lime;

}

.error{

    color:red;

}

.info{

    color:#00bfff;

}

.estado-box{

    background:#1a1a1a;

    padding:20px;

    border-radius:20px;

    margin-top:20px;

    text-align:center;

}

</style>

</head>
<body>

<header>
ESCÁNER PROM26
</header>

<div class="container">

<div class="card">

<div id="reader"></div>

<div class="estado-box">

<div id="resultadoScan">

ESCANEA UN QR

</div>

</div>

</div>

</div>

<script>

// ======================================
// FIREBASE
// ======================================

const firebaseConfig = {

  apiKey: "AIzaSyBtloFEBGr6Z2hFkT3zr02tgiu5IIyqBkE",

  authDomain: "prom26-62dce.firebaseapp.com",

  projectId: "prom26-62dce",

  storageBucket: "prom26-62dce.firebasestorage.app",

  messagingSenderId: "662057183440",

  appId: "1:662057183440:web:96484f9031cbfb9b3596d5"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

// ======================================
// VARIABLES
// ======================================

let escaneando = true;

// ======================================
// INICIAR SCANNER
// ======================================

function iniciarScanner(){

    const html5QrCode = new Html5Qrcode("reader");

    html5QrCode.start(

        { facingMode: "environment" },

        {

            fps:10,

            qrbox:250

        },

        async(decodedText)=>{

            // EVITAR MULTIPLE ESCANEO
            if(!escaneando){
                return;
            }

            escaneando = false;

            await verificarQR(decodedText);

            setTimeout(()=>{

                escaneando = true;

            },2000);

        }

    );

}

// ======================================
// VERIFICAR QR
// ======================================

async function verificarQR(id){

    const resultado = document.getElementById("resultadoScan");

    const docRef = db.collection("boletos").doc(id);

    const docSnap = await docRef.get();

    // ======================================
    // QR INVALIDO
    // ======================================

    if(!docSnap.exists){

        resultado.innerHTML = `

        <div class="error">
        QR INVÁLIDO ❌
        </div>

        `;

        alert("QR INVÁLIDO ❌");

        return;
    }

    const data = docSnap.data();

    // ======================================
    // QR CLONADO
    // ======================================

    if(data.usado){

        resultado.innerHTML = `

        <div class="error">
        QR CLONADO ⚠️
        </div>

        <div class="info">
        ${id}
        </div>

        `;

        alert(`

QR CLONADO ⚠️

${id}

        `);

        return;
    }

    // ======================================
    // ACTUALIZAR FIREBASE
    // ======================================

    await docRef.update({

        usado:true,

        horaEntrada:new Date()

    });

    // ======================================
    // MOSTRAR RESULTADO
    // ======================================

    resultado.innerHTML = `

    <div class="success">
    ACCESO PERMITIDO ✅
    </div>

    <div class="info">
    ${id}
    </div>

    <div>
    ${data.tipo}
    </div>

    `;

    // ======================================
    // ALERTA
    // ======================================

    alert(`

ACCESO PERMITIDO ✅



${id}

TIPO:
${data.tipo}

    `);

}

// ======================================
// INICIAR
// ======================================

iniciarScanner();

</script>

</body>
</html>
