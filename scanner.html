<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ESCÁNER PROM26</title>

<link rel="stylesheet" href="style.css">

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<!-- TU FIREBASE -->
<script src="firebase.js"></script>

<!-- QR -->
<script src="https://unpkg.com/html5-qrcode"></script>

<style>

#reader{

    width:100%;

    max-width:500px;

    margin:auto;

    background:white;

    padding:20px;

    border-radius:20px;

}

#resultadoScan{

    margin-top:30px;

    text-align:center;

    font-size:35px;

    font-weight:bold;

}

.success{
    color:lime;
}

.error{
    color:red;
}

.info{
    color:#00bfff;
}

.nombre{

    font-size:40px;

    margin-top:10px;

    color:#00ff88;

}

.estado-box{

    background:#1a1a1a;

    padding:20px;

    border-radius:20px;

    margin-top:20px;

    text-align:center;

}

</style>

</head>
<body>

<header>
ESCÁNER PROM26
</header>

<div class="container">

<div class="card">

<h1>CONTROL DE ACCESO</h1>

<div id="reader"></div>

<div class="estado-box">

<div id="resultadoScan">

ESCANEA UN QR

</div>

</div>

</div>

</div>

<script>

// ======================================
// VARIABLES
// ======================================

let escaneando = true;

// ======================================
// VERIFICAR LOGIN
// ======================================

firebase.auth().onAuthStateChanged((user)=>{

    if(!user){

        window.location.href = "login.html";

    }

});

// ======================================
// INICIAR CÁMARA
// ======================================

function iniciarScanner(){

    const html5QrCode = new Html5Qrcode("reader");

    Html5Qrcode.getCameras()

    .then(devices => {

        if(devices && devices.length){

            html5QrCode.start(

                devices[0].id,

                {

                    fps:10,

                    qrbox:250

                },

                async(decodedText)=>{

                    if(!escaneando){
                        return;
                    }

                    escaneando = false;

                    await verificarQR(decodedText);

                    setTimeout(()=>{

                        escaneando = true;

                    },2500);

                }

            );

        }

    })

    .catch(err => {

        alert("NO SE PUDO ABRIR LA CÁMARA ❌");

        console.log(err);

    });

}

// ======================================
// VERIFICAR QR
// ======================================

async function verificarQR(id){

    const resultado = document.getElementById("resultadoScan");

    const docRef = db.collection("boletos").doc(id);

    const docSnap = await docRef.get();

    // QR INVÁLIDO

    if(!docSnap.exists){

        resultado.innerHTML = `

        <div class="error">
        QR INVÁLIDO ❌
        </div>

        `;

        alert("QR INVÁLIDO ❌");

        return;
    }

    const data = docSnap.data();

    // NOMBRE

    let nombre = "SIN REGISTRAR";

    if(data.nombre){

        nombre = data.nombre;

    }

    // CLONADO

    if(data.usado){

        resultado.innerHTML = `

        <div class="error">
        QR CLONADO ⚠️
        </div>

        <div class="nombre">
        ${nombre}
        </div>

        <div class="info">
        ${id}
        </div>

        <div>
        ${data.tipo}
        </div>

        `;

        alert(`

QR CLONADO ⚠️

NOMBRE:
${nombre}

QR:
${id}

        `);

        return;
    }

    // ACTUALIZAR

    await docRef.update({

        usado:true,

        horaEntrada:new Date()

    });

    // MOSTRAR

    resultado.innerHTML = `

    <div class="success">
    ACCESO PERMITIDO ✅
    </div>

    <div class="nombre">
    ${nombre}
    </div>

    <div class="info">
    ${id}
    </div>

    <div>
    ${data.tipo}
    </div>

    `;

    alert(`

ACCESO PERMITIDO ✅

NOMBRE:
${nombre}

QR:
${id}

TIPO:
${data.tipo}

    `);

}

// ======================================
// INICIAR
// ======================================

iniciarScanner();

</script>

</body>
</html>
