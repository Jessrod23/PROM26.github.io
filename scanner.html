<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ESCÁNER PROM26</title>

<link rel="stylesheet" href="style.css">

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script src="firebase.js"></script>

<!-- QR -->
<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{

    background:#0f0f0f;

    color:white;

    font-family:Arial;

}

#reader{

    width:100%;

    max-width:500px;

    margin:auto;

    margin-top:30px;

    background:white;

    padding:20px;

    border-radius:20px;

}

#resultado{

    margin-top:30px;

    text-align:center;

    font-size:30px;

    font-weight:bold;

}

.success{
    color:lime;
}

.error{
    color:red;
}

.info{
    color:#00bfff;
}

.nombre{

    font-size:40px;

    margin-top:10px;

    color:#00ff88;

}

button{

    width:100%;

    max-width:400px;

    padding:15px;

    border:none;

    border-radius:15px;

    background:#00bfff;

    color:white;

    font-size:20px;

    cursor:pointer;

    margin:auto;

    display:block;

    margin-top:20px;

}

</style>

</head>
<body>

<h1 style="text-align:center;">
ESCÁNER PROM26
</h1>

<button onclick="iniciarCamara()">
INICIAR CÁMARA
</button>

<div id="reader"></div>

<div id="resultado">

ESCANEA UN QR

</div>

<script>

// ======================================
// VARIABLES
// ======================================

let scanner;

let escaneando = true;

// ======================================
// INICIAR CÁMARA
// ======================================

async function iniciarCamara(){

    try{

        scanner = new Html5Qrcode("reader");

        await scanner.start(

            {
                facingMode:"environment"
            },

            {

                fps:10,

                qrbox:{
                    width:250,
                    height:250
                }

            },

            async(textoQR)=>{

                if(!escaneando){
                    return;
                }

                escaneando = false;

                await verificarQR(textoQR);

                setTimeout(()=>{

                    escaneando = true;

                },3000);

            }

        );

    }catch(error){

        console.log(error);

        alert("NO SE PUDO ABRIR LA CÁMARA ❌");

    }

}

// ======================================
// VERIFICAR QR
// ======================================

async function verificarQR(id){

    const resultado = document.getElementById("resultado");

    const docRef = db.collection("boletos").doc(id);

    const docSnap = await docRef.get();

    // ======================================
    // INVALIDO
    // ======================================

    if(!docSnap.exists){

        resultado.innerHTML = `

        <div class="error">
        QR INVÁLIDO ❌
        </div>

        `;

        alert("QR INVÁLIDO ❌");

        return;
    }

    const data = docSnap.data();

    let nombre = "SIN REGISTRAR";

    if(data.nombre){

        nombre = data.nombre;

    }

    // ======================================
    // CLONADO
    // ======================================

    if(data.usado){

        resultado.innerHTML = `

        <div class="error">
        QR CLONADO ⚠️
        </div>

        <div class="nombre">
        ${nombre}
        </div>

        <div class="info">
        ${id}
        </div>

        `;

        alert(`

QR CLONADO ⚠️

${nombre}

        `);

        return;
    }

    // ======================================
    // ACTUALIZAR
    // ======================================

    await docRef.update({

        usado:true,

        horaEntrada:new Date()

    });

    // ======================================
    // MOSTRAR
    // ======================================

    resultado.innerHTML = `

    <div class="success">
    ACCESO PERMITIDO ✅
    </div>

    <div class="nombre">
    ${nombre}
    </div>

    <div class="info">
    ${id}
    </div>

    <div>
    ${data.tipo}
    </div>

    `;

    alert(`

ACCESO PERMITIDO ✅

NOMBRE:
${nombre}

QR:
${id}

TIPO:
${data.tipo}

    `);

}

</script>

</body>
</html>
